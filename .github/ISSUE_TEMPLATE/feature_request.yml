name: Feature Request
description: Suggest an enhancement or new feature for APEX
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! We'd love to hear about how APEX can be improved.

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe the use case or problem this feature would solve
      placeholder: |
        As a developer, I want to be able to control multiple devices simultaneously
        because my automation workflows require coordinated actions across several boards.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working?
      placeholder: |
        Add a "devices" configuration file where users can define multiple hardware endpoints.
        The CLI should be able to broadcast commands to all connected devices in parallel.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
      placeholder: |
        1. Manual device selection before each command (less convenient)
        2. Scripting wrapper around single-device commands (duplicates logic)

  - type: dropdown
    id: affected_module
    attributes:
      label: Affected Module(s)
      description: Which APEX module(s) would this feature affect?
      multiple: true
      options:
        - Core/CLI
        - Core/RAM
        - MicroMax/OS
        - MicroMax/OS Client
        - IOT
        - conductor
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any sketches, mockups, links, or other context

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have checked existing issues and discussions for similar requests
          required: true
